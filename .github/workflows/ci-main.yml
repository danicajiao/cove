name: CI - Main

on:
  push:
    branches:
      - main
    paths:
      - 'Cove/**'
      - 'Cove.xcodeproj/**'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'fastlane/**'
      - '.github/workflows/ci-main.yml'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.1.app/Contents/Developer

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true

      - name: Build iOS app
        run: bundle exec fastlane build

      - name: Run tests
        run: bundle exec fastlane test
        continue-on-error: true
